<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Scene It — Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; padding: 20px; box-sizing: border-box; }
    .card { max-width: 360px; }
    h2 { font-size: 24px; margin-bottom: 12px; }
    p { color: #888; font-size: 15px; line-height: 1.5; }
    a { color: #5aa8d4; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🎬 Scene It</h2>
    <p id="debug" style="font-size:11px; color:#444; word-break:break-all;"></p>
    <p>Opening the app to reset your password…</p>
    <p style="margin-top: 20px; font-size: 13px;">If the app doesn't open, <a id="fallback" href="#">tap here</a>.</p>
  </div>
  <script>
    document.getElementById('debug').textContent = window.location.href;
    const searchParams = new URLSearchParams(window.location.search);
    const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
    const code = searchParams.get('code') || hashParams.get('code');
    const accessToken = searchParams.get('access_token') || hashParams.get('access_token');
    const refreshToken = searchParams.get('refresh_token') || hashParams.get('refresh_token');

    let deepLink = null;
    if (code) {
      deepLink = 'sceneit://reset-password?code=' + encodeURIComponent(code);
    } else if (accessToken && refreshToken) {
      deepLink = 'sceneit://reset-password?access_token=' + encodeURIComponent(accessToken) + '&refresh_token=' + encodeURIComponent(refreshToken);
    }

    if (deepLink) {
      document.getElementById('fallback').href = deepLink;
      window.location.href = deepLink;
    } else {
      document.querySelector('p').textContent = 'Invalid or expired reset link. Please request a new one.';
    }
  </script>
</body>
</html>
